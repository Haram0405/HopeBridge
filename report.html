<div class="sidebar">

    <ul class="list">

        <li> <a href="causes.html"><i class="fa-solid fa-heart"></i> Donation Causes </a></li>

        <div class="icons">
            <i class="fa-brands fa-facebook"></i>
            <i class="fa-brands fa-github"></i>
            <i class="fa-brands fa-linkedin"></i>
        </div>
        </div>

    <div class="wrapper">

    <div class="page-heading">
        <h1>Reports</h1>
        <p><i>Overall donation statistics</i></p>
    </div>

    <div class="row">

        <div class="col-md-4">
            <div class="dashboards-card">
                <div class="card-header">Total Donations</div>
                <div class="amount" id="totalAmount">0</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="dashboards-card">
                <div class="card-header">Total Donors</div>
                <div class="amount" id="totalDonors">0</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="dashboards-card">
                <div class="card-header">Highest Donation</div>
                <div class="amount" id="highestDonation">0</div>
            </div>
        </div>

    </div>

</div>

    <!-- JS -->
<script>
   const donations =
JSON.parse(localStorage.getItem("donations")) || [];

// TOTAL DONATIONS
let total = 0;
let highest = 0;

donations.forEach(d => {

    let amt = Number(d.amount);

    total += amt;

    if(amt > highest){
        highest = amt;
    }

});

// SHOW DATA

document.getElementById("totalAmount").innerText =
"$ " + total;

document.getElementById("totalDonors").innerText =
donations.length;

document.getElementById("highestDonation").innerText =
"$ " + highest;
</script>

</body>
